<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background for maskable (safe zone is center 80%) -->
  <rect width="512" height="512" fill="#0a1a0f"/>
  <!-- DNA double helix - left strand -->
  <path d="M190 90 Q256 170 190 250 Q256 330 190 410"
        stroke="#22c55e" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- DNA double helix - right strand -->
  <path d="M322 90 Q256 170 322 250 Q256 330 322 410"
        stroke="#16a34a" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Base pairs (rungs) -->
  <line x1="204" y1="130" x2="308" y2="130" stroke="#4ade80" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
  <line x1="196" y1="190" x2="316" y2="190" stroke="#4ade80" stroke-width="8" opacity="0.5" stroke-linecap="round"/>
  <line x1="200" y1="250" x2="312" y2="250" stroke="#4ade80" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
  <line x1="196" y1="310" x2="316" y2="310" stroke="#4ade80" stroke-width="8" opacity="0.5" stroke-linecap="round"/>
  <line x1="204" y1="370" x2="308" y2="370" stroke="#4ade80" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
  <!-- AI sparkle -->
  <circle cx="375" cy="130" r="28" fill="#22c55e" opacity="0.9"/>
  <text x="375" y="140" text-anchor="middle" font-size="26" font-weight="bold" fill="#fff" font-family="sans-serif">AI</text>
</svg>
